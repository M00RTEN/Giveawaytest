<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>GameNinja Giveaway - Universal</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #9146ff; --a: #00f2ff; --bg: #0e0e10; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #18181b; padding: 30px; border-radius: 24px; border: 2px solid var(--p); max-width: 450px; margin: auto; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin: 10px 0; text-align: center; box-sizing: border-box; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
        #debug { background: #000; color: #0f0; padding: 10px; height: 100px; overflow-y: auto; text-align: left; font-size: 11px; margin-top: 15px; border: 1px solid #222; font-family: monospace; }
        .stats { font-size: 4rem; font-weight: 900; color: var(--a); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h2>Oppsett</h2>
        <p style="font-size: 0.9rem; color: #aaa;">Hent token fra <a href="https://antiscuff.com/oauth/" target="_blank" style="color:var(--a);">antiscuff.com/oauth</a></p>
        <input type="password" id="oauth-token" placeholder="oauth:your_token_here">
        <input type="text" id="channel-name" placeholder="Ditt kanalnavn">
        <button class="btn" onclick="startApp()">START GIVEAWAY</button>
    </div>

    <div id="app" style="display:none;" class="card">
        <h2 id="display-name" style="color:var(--p);">KANAL</h2>
        <input type="text" id="cmd" value="!join">
        <div class="stats" id="count">0</div>
        <button class="btn" onclick="draw()">TREKK VINNER & SEND CHAT</button>
        <div id="debug"></div>
    </div>

    <script>
        let socket;
        let pool = [];
        let participants = new Set();
        let currentChan = "";

        const log = (msg) => {
            const d = document.getElementById('debug');
            d.innerHTML += `> ${msg}<br>`;
            d.scrollTop = d.scrollHeight;
        };

        function startApp() {
            const token = document.getElementById('oauth-token').value.trim();
            currentChan = document.getElementById('channel-name').value.trim().toLowerCase();

            if (!token || !currentChan) return alert("Du må fylle inn både token og kanalnavn!");

            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('display-name').innerText = currentChan.toUpperCase();

            connect(currentChan, token);
        }

        function connect(chan, tok) {
            socket = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            socket.onopen = () => {
                socket.send(`PASS ${tok}`);
                socket.send(`NICK ${chan}`);
                socket.send(`JOIN #${chan}`);
                log("Tilkoblet og klar for påmeldinger!");
            };

            socket.onmessage = (e) => {
                if (e.data.includes('PING')) {
                    socket.send('PONG :tmi.twitch.tv');
                    return;
                }
                if (e.data.includes('PRIVMSG')) {
                    const parts = e.data.split('!');
                    const user = parts[0].substring(1);
                    const msg = e.data.split('PRIVMSG')[1].split(':')[1].trim().toLowerCase();
                    const trigger = document.getElementById('cmd').value.trim().toLowerCase();

                    if (user && msg === trigger && !participants.has(user)) {
                        participants.add(user);
                        pool.push(user);
                        document.getElementById('count').innerText = participants.size;
                        log(`${user} ble med.`);
                    }
                }
            };
        }

        function draw() {
            if (pool.length === 0) return alert("Ingen deltakere!");
            const winner = pool[Math.floor(Math.random() * pool.length)];
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            if (socket && socket.readyState === WebSocket.OPEN) {
                const text = `Gratulerer @${winner}! Du vant giveawayen! 🎉 Send en melding her eller whisper med info.`;
                socket.send(`PRIVMSG #${currentChan} :${text}`);
                log(`MELDING SENDT TIL CHAT: Vinner er ${winner}`);
            }
            
            alert("Vinneren er: " + winner);
        }
    </script>
</body>
</html>
